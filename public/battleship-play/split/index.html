<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>거북선 디펜스 · 분할 화면</title>
    <style>
      :root {
        --bg: #0b0f1a;
        --line: rgba(255, 255, 255, 0.22);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 100%; height: 100%; }
      body {
        background: var(--bg);
        overflow: hidden;
      }
      #split-grid {
        width: 100vw;
        height: 100dvh;
        display: grid;
        gap: 2px;
        background: var(--line);
      }
      .pane {
        min-width: 0;
        min-height: 0;
        background: #101523;
      }
      .pane iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #0a1635;
      }
    </style>
  </head>
  <body>
    <main id="split-grid" aria-label="거북선 디펜스 분할 화면"></main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
