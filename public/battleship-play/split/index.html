<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>거북선 디펜스 · 분할 화면</title>
    <style>
      :root {
        --ink: #e6eefb;
        --muted: #9cb0d3;
        --line: rgba(184, 204, 243, 0.28);
        --panel: rgba(11, 22, 50, 0.92);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 8% 10%, rgba(78, 102, 164, 0.28), transparent 42%),
          linear-gradient(180deg, #050a1a 0%, #0a1736 100%);
      }
      .shell {
        width: min(1500px, 100% - 20px);
        margin: 10px auto 14px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(7, 15, 36, 0.82);
      }
      .title-wrap h1 {
        margin: 0;
        font-size: clamp(20px, 2.4vw, 30px);
        font-weight: 900;
      }
      .title-wrap p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }
      .btn {
        border: 1px solid rgba(206, 222, 253, 0.65);
        border-radius: 10px;
        background: rgba(22, 36, 74, 0.85);
        color: #eef4ff;
        min-height: 42px;
        padding: 0 14px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
      }
      .status {
        margin: 10px 0;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(6, 14, 32, 0.75);
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }
      .grid {
        display: grid;
        gap: 10px;
      }
      .pane {
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: var(--panel);
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 330px;
      }
      .pane-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(184, 204, 243, 0.22);
        background: rgba(12, 24, 56, 0.88);
      }
      .pane-head .player {
        font-weight: 900;
        font-size: 14px;
      }
      .pane-head .hint {
        color: #a8bcdf;
        font-size: 12px;
        font-weight: 700;
      }
      .pane iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #0a1635;
      }
      @media (max-width: 760px) {
        .shell { width: min(1500px, 100% - 10px); margin-top: 6px; }
        .topbar { flex-direction: column; align-items: stretch; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="title-wrap">
          <h1 id="title-text">거북선 디펜스 · 분할 화면</h1>
          <p id="subtitle-text">각 화면은 독립 전투입니다. 각자 퀴즈를 풀어 자신의 거북선을 강화하세요.</p>
        </div>
        <a class="btn" href="../../">메인화면</a>
      </div>
      <div class="status" id="status-box">분할 화면을 구성하는 중...</div>
      <div class="grid" id="split-grid"></div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
