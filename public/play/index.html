<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게임 시작 준비</title>
    <style>
      :root {
        --ink: #18294b;
        --muted: #5f6f8f;
        --line: rgba(24, 41, 75, 0.18);
        --paper: rgba(251, 247, 236, 0.94);
        --paper-strong: rgba(251, 247, 236, 0.98);
        --gold: #caa23a;
        --gold-shadow: #9f7f24;
        --blue: #5e84d6;
        --bg-1: #efe6d0;
        --bg-2: #ddd2b7;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 20%, rgba(255,255,255,0.55), transparent 45%),
          radial-gradient(circle at 88% 14%, rgba(255,255,255,0.42), transparent 48%),
          linear-gradient(180deg, var(--bg-1), var(--bg-2));
      }
      .shell {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .panel {
        width: min(820px, 100%);
        border: 2px solid rgba(24, 41, 75, 0.28);
        border-radius: 20px;
        background: linear-gradient(180deg, var(--paper-strong), var(--paper));
        box-shadow:
          0 18px 40px rgba(24, 41, 75, 0.16),
          inset 0 1px 0 rgba(255,255,255,0.7);
        padding: 22px;
      }
      .title {
        margin: 0 0 10px;
        font-size: clamp(24px, 3vw, 34px);
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: clamp(14px, 1.7vw, 18px);
        line-height: 1.5;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.65);
        margin-bottom: 18px;
        font-weight: 700;
      }
      .dot {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: var(--blue);
        box-shadow: 0 0 0 6px rgba(94, 132, 214, 0.15);
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.12); opacity: 0.75; }
      }
      .summary {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255,255,255,0.55);
        padding: 14px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      .summary-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255,255,255,0.55);
        border: 1px solid rgba(24, 41, 75, 0.08);
      }
      .summary-row .k {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }
      .summary-row .v {
        font-size: 16px;
        font-weight: 800;
      }
      .actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .btn {
        border: 2px solid rgba(24, 41, 75, 0.85);
        border-radius: 14px;
        background: #fff;
        padding: 12px 16px;
        font-size: 15px;
        font-weight: 800;
        color: var(--ink);
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        box-shadow: 0 5px 0 rgba(24, 41, 75, 0.18);
      }
      .btn:hover { transform: translateY(-1px); }
      .btn:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(24, 41, 75, 0.18); }
      .btn.primary {
        background: linear-gradient(180deg, #f8d867, var(--gold));
        border-color: var(--gold-shadow);
        color: #3d2a00;
        box-shadow: 0 5px 0 rgba(159, 127, 36, 0.25);
      }
      .hint {
        margin-top: 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .error {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(170, 30, 30, 0.25);
        background: rgba(255, 236, 236, 0.8);
        color: #7c1f1f;
        font-weight: 700;
        display: none;
      }
      .error.show { display: block; }
      @media (max-width: 680px) {
        .panel { padding: 16px; border-radius: 16px; }
        .summary { grid-template-columns: 1fr; }
        .actions { flex-direction: column; }
        .btn { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <main class="panel" aria-live="polite">
        <h1 class="title">게임 시작 준비 중</h1>
        <p class="subtitle">
          메인화면에서 선택한 설정을 확인한 뒤, 해당 게임 화면으로 자동 이동합니다.
          설정이 없거나 불완전하면 메인화면으로 돌아가서 다시 선택할 수 있습니다.
        </p>
        <div class="status" id="status-box">
          <span class="dot" aria-hidden="true"></span>
          <span id="status-text">설정을 불러오는 중...</span>
        </div>
        <section class="summary" id="summary-box" aria-label="시작 설정 요약"></section>
        <div class="error" id="error-box"></div>
        <div class="actions">
          <button type="button" class="btn primary" id="retry-btn">다시 시도</button>
          <a class="btn" id="launcher-link" href="../">메인화면으로 돌아가기</a>
          <a class="btn" href="./student/">학생 상세 기록</a>
          <a class="btn" href="./records/">전체 기록 보기(로컬)</a>
          <a class="btn" href="./classroom/">학급관리 / 명예의 전당</a>
          <a class="btn" id="editor-link" href="https://luckybridge.github.io/knolquiz-editor/jumpmap-editor/">맵 에디터 열기</a>
        </div>
        <p class="hint">
          현재 단계는 서비스 진입 라우터입니다. 점프맵은 아직 테스트 런타임 기반 플레이 모드로 연결되고,
          추후 운영용 점프맵 런타임으로 교체될 예정입니다.
        </p>
      </main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
