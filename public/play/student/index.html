<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학생 상세 기록</title>
    <style>
      :root {
        --ink: #18294b;
        --muted: #5b6b89;
        --line: rgba(24, 41, 75, 0.14);
        --paper: rgba(251, 247, 236, 0.96);
        --bg1: #f0e8d6;
        --bg2: #ddd3bc;
        --gold: #caa23a;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 12%, rgba(255,255,255,0.65), transparent 48%),
          radial-gradient(circle at 90% 22%, rgba(255,255,255,0.55), transparent 52%),
          linear-gradient(180deg, var(--bg1), var(--bg2));
      }
      .shell { max-width: 1320px; margin: 0 auto; padding: 18px; }
      .topbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .title {
        margin: 0;
        font-size: clamp(24px, 2.6vw, 36px);
        font-weight: 900;
        letter-spacing: -0.02em;
      }
      .top-actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .btn {
        border: 2px solid rgba(24, 41, 75, 0.85);
        background: #fff;
        color: var(--ink);
        border-radius: 12px;
        padding: 10px 14px;
        font-weight: 800;
        cursor: pointer;
        min-height: 44px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 0 rgba(24, 41, 75, 0.12);
      }
      .btn.primary {
        background: linear-gradient(180deg, #f9db73, var(--gold));
        border-color: #9d7c22;
        color: #3a2a03;
      }
      .status {
        margin-bottom: 12px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255,255,255,0.65);
        color: var(--muted);
        font-weight: 700;
      }
      .status.error { color: #b91c1c; }
      .toolbar {
        margin-bottom: 12px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255,255,255,0.72);
        display: flex;
        gap: 8px;
        align-items: end;
        flex-wrap: wrap;
      }
      .toolbar-field {
        min-width: 220px;
        display: grid;
        gap: 4px;
      }
      .toolbar-field label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }
      .toolbar-field select {
        min-height: 42px;
        border: 1px solid rgba(24, 41, 75, 0.22);
        border-radius: 10px;
        font: inherit;
        padding: 8px 10px;
        background: #fff;
      }
      .toolbar-note {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.4;
      }
      .grid {
        display: grid;
        grid-template-columns: 1.1fr 1fr 1fr;
        gap: 12px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--paper);
        box-shadow: 0 10px 22px rgba(24,41,75,0.08);
        overflow: hidden;
      }
      .card h2 {
        margin: 0;
        padding: 12px 14px;
        font-size: 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255,255,255,0.7);
      }
      .card .body {
        padding: 10px;
        max-height: 420px;
        overflow: auto;
      }
      .kv {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .kv .cell {
        border: 1px solid rgba(24,41,75,0.08);
        background: rgba(255,255,255,0.58);
        border-radius: 10px;
        padding: 8px;
      }
      .kv .k {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }
      .kv .v {
        margin-top: 2px;
        font-size: 14px;
        font-weight: 800;
      }
      .list {
        display: grid;
        gap: 8px;
      }
      .item {
        border: 1px solid rgba(24,41,75,0.08);
        border-radius: 12px;
        background: rgba(255,255,255,0.66);
        padding: 10px;
      }
      .item .title-line {
        font-size: 13px;
        font-weight: 900;
      }
      .item .meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        margin-top: 4px;
      }
      .full-span { grid-column: 1 / -1; }
      .empty {
        color: var(--muted);
        font-weight: 700;
        padding: 12px;
        text-align: center;
      }
      @media (max-width: 1100px) {
        .grid { grid-template-columns: 1fr 1fr; }
        .full-span { grid-column: 1 / -1; }
      }
      @media (max-width: 760px) {
        .topbar { flex-direction: column; align-items: stretch; }
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <h1 class="title">학생 상세 기록</h1>
        <div class="top-actions">
          <button class="btn primary" id="refresh-btn" type="button">새로고침</button>
          <a class="btn" id="classroom-page-link" href="../classroom/">학급관리</a>
          <a class="btn" id="records-page-link" href="../records/">지난 기록</a>
          <a class="btn" href="../">플레이 시작</a>
          <a class="btn" href="../../">런처</a>
        </div>
      </div>
      <div class="status" id="status-box">학생 기록을 불러오는 중...</div>
      <div class="toolbar">
        <div class="toolbar-field">
          <label for="student-select">학생 번호</label>
          <select id="student-select"></select>
        </div>
        <div class="toolbar-field">
          <label for="period-select">조회 기간</label>
          <select id="period-select">
            <option value="all">전체</option>
            <option value="30">최근 30일</option>
            <option value="7">최근 7일</option>
          </select>
        </div>
        <div class="toolbar-note" id="period-note">선택한 기간 기준으로 퀴즈/점프맵/오답/시즌 기록을 필터링합니다.</div>
      </div>
      <div class="grid">
        <section class="card">
          <h2>학생 요약</h2>
          <div class="body"><div class="kv" id="summary-grid"></div></div>
        </section>
        <section class="card">
          <h2>최근 기본 퀴즈</h2>
          <div class="body"><div class="list" id="quiz-list"></div></div>
        </section>
        <section class="card">
          <h2>최근 점프맵</h2>
          <div class="body"><div class="list" id="jumpmap-list"></div></div>
        </section>
        <section class="card">
          <h2>명예의 전당 (시즌별)</h2>
          <div class="body"><div class="list" id="season-list"></div></div>
        </section>
        <section class="card full-span">
          <h2>오답문제모음 (최근)</h2>
          <div class="body"><div class="list" id="wrong-list"></div></div>
        </section>
      </div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
