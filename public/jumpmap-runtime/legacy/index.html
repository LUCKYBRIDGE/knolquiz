<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>놀퀴즈 - 점프맵 레거시 플레이 호스트</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
      }
      body {
        background: #e7dcc1;
        color: #1f2f4a;
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
        overflow: hidden;
      }
      .host-root {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }
      .panel {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        width: min(560px, calc(100% - 20px));
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(31, 47, 74, 0.14);
        border-radius: 12px;
        padding: 10px 12px;
        box-shadow: 0 8px 26px rgba(31, 47, 74, 0.10);
        backdrop-filter: blur(4px);
      }
      body:not(.panel-visible) .panel {
        display: none;
      }
      body.frame-ready .panel {
        opacity: 0.78;
      }
      h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 800;
      }
      p {
        margin: 6px 0 0;
        line-height: 1.45;
        color: #4f5f79;
        font-size: 12px;
      }
      .row {
        margin-top: 8px;
        font-size: 11px;
        color: #4f5f79;
        word-break: break-all;
      }
      .events {
        margin: 6px 0 0;
        padding-left: 16px;
        max-height: 108px;
        overflow: auto;
      }
      .events li {
        margin: 2px 0;
        line-height: 1.35;
      }
      a {
        color: #2f62c8;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-right: 8px;
        font-weight: 700;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #4b79dd;
      }
      body.frame-ready .dot {
        background: #26a269;
      }
    </style>
  </head>
  <body>
    <div class="host-root">
      <iframe class="frame" id="legacy-frame" title="점프맵 레거시 플레이 호스트"></iframe>
      <section class="panel" aria-live="polite">
        <h1><span class="badge"><span class="dot"></span>Runtime Legacy Host</span>점프맵 레거시 플레이 호스트</h1>
        <p id="status-text">레거시 플레이 프레임을 준비하고 있습니다.</p>
        <div class="row" id="target-row" hidden></div>
        <div class="row" id="compat-mode-row" hidden></div>
        <div class="row" id="compat-event-row" hidden></div>
        <div class="row" id="compat-events-row" hidden>
          <strong>compat events</strong>
          <ol class="events" id="compat-events"></ol>
        </div>
        <div class="row" id="fallback-row" hidden>
          자동 로딩이 되지 않으면 <a id="fallback-link" href="#" target="_blank" rel="noopener noreferrer">레거시 플레이 새 탭 열기</a>
        </div>
      </section>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
